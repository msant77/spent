<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Relatório de Horas</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    max-width: 720px;
    margin: 2.5rem auto;
    padding: 0 1rem;
    line-height: 1.5;
  }
  h1 { font-size: 1.5rem; font-weight: 600; }
  .empty { color: #888; font-style: italic; }
</style>
</head>
<body>
<main>
<h1 id="title">Relatório de Horas</h1>
<p class="empty" id="empty">Sem dados ainda.</p>
</main>
<script>
  fetch('months.json', { cache: 'no-store' })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      var client = data && data.client ? data.client : '';
      if (client) {
        document.title = client + ' · Relatório de Horas';
        document.getElementById('title').textContent = client + ' · Relatório de Horas';
      }
    })
    .catch(function () { /* leave defaults */ });
</script>
</body>
</html>
